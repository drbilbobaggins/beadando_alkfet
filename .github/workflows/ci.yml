name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./src/backend/BoardGame.Api
          file: ./src/backend/BoardGame.Api/Dockerfile
          push: false
          tags: boardgame-backend:ci

      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./src/frontend/boardgame-app
          file: ./src/frontend/boardgame-app/Dockerfile
          push: false
          tags: boardgame-frontend:ci
